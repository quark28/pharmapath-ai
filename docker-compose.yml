version: "3.9"

services:
  # ── PostgreSQL + PostGIS (готов для продакшн-миграции) ────────────────────
  db:
    image: postgis/postgis:15-3.4
    container_name: pharmapath-db
    environment:
      POSTGRES_DB: pharmapath
      POSTGRES_USER: pharma
      POSTGRES_PASSWORD: pharma_secret_2025
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma -d pharmapath"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: pharmapath-backend
    ports:
      - "8000:8000"
    environment:
      - PHARMA_DATA_DIR=/app/data/output
      - PHARMA_MODEL_DIR=/app/models
      - PHARMA_LLM_BACKEND=mock
      - PHARMA_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/output:/app/data/output:ro
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Streamlit Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: pharmapath-frontend
    ports:
      - "8501:8501"
    environment:
      - PHARMA_API_URL=http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata: